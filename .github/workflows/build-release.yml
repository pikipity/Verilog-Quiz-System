name: Build Release

# 触发条件：只有 main 分支的 push 才触发（包括 PR 合并）
on:
  push:
    branches:
      - main

  # 允许手动触发
  workflow_dispatch:

# 权限设置
permissions:
  contents: write    # 用于创建 Release
  actions: read

# 使用 Node.js 24（消除 deprecation 警告）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false    # 一个平台失败不影响其他平台
      matrix:
        include:
          - os: windows-latest
            target: windows
            ext: .exe
            build_cmd: windows
          - os: ubuntu-22.04
            target: linux
            ext: ''
            build_cmd: linux
          - os: macos-latest
            target: macos
            ext: ''
            build_cmd: macos

    runs-on: ${{ matrix.os }}

    steps:
      # ========== 1. 检出代码 ==========
      - name: Checkout code
        uses: actions/checkout@v4

      # ========== 2. 设置 Python ==========
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ========== 3. 安装依赖 ==========
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet flet-desktop cryptography requests

      # ========== 4. 用 flet build 打包 ==========
      - name: Build with flet
        run: flet build ${{ matrix.build_cmd }} --output dist

      # ========== 5. 整理构建产物 ==========
      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ matrix.target }}" = "windows" ]; then
            cp -r dist/${{ matrix.target }}/* release/
          else
            cp -r dist/${{ matrix.target }}/* release/
          fi

      # ========== 6. 上传构建产物 ==========
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verilog-quiz-${{ matrix.target }}
          path: release/*
          retention-days: 30

      # ========== 7. 创建 Release ==========
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ## Verilog Quiz System v1.0.${{ github.run_number }}

            自动构建版本（flet build，开箱即用）

            ### 构建信息
            - 提交: ${{ github.sha }}
            - 提交者: ${{ github.event.head_commit.author.name }}
            - 提交信息: ${{ github.event.head_commit.message }}
            - 构建时间: ${{ github.event.head_commit.timestamp }}

            ### 下载说明
            - `verilog-quiz-windows.exe`: Windows 版本，下载后直接双击运行
            - `verilog-quiz-linux`: Linux (Ubuntu) 版本
            - `verilog-quiz-macos`: macOS 版本

            ### 系统要求
            - **Windows**: Windows 10/11，需预装 iverilog 和 GTKWave
            - **Linux**: Ubuntu 22.04+，需预装 iverilog 和 GTKWave
            - **macOS**: macOS 15.0+，需预装 iverilog 和 GTKWave
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
