name: Build Release

# 触发条件：只有 main 分支的 push 才触发（包括 PR 合并）
on:
  push:
    branches:
      - main

  # 允许手动触发
  workflow_dispatch:

# 权限设置
permissions:
  contents: write    # 用于创建 Release
  actions: read

# 使用 Node.js 24（消除 deprecation 警告）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false    # 一个平台失败不影响其他平台
      matrix:
        include:
          - os: windows-latest
            target: windows
            ext: .exe
            build_cmd: windows
          - os: ubuntu-22.04
            target: linux
            ext: ''
            build_cmd: linux
          - os: macos-latest
            target: macos
            ext: ''
            build_cmd: macos

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45    # flet build 下载 Flutter SDK 可能较久
    env:
      PYTHONIOENCODING: utf-8
      PYTHONLEGACYWINDOWSSTDIO: utf-8

    steps:
      # ========== 1. 检出代码 ==========
      - name: Checkout code
        uses: actions/checkout@v4

      # ========== 2. 安装 Linux 系统依赖（仅 Linux）==========
      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libblkid-dev liblzma-dev libgtk-3-dev libstdc++-12-dev

      # ========== 3. 设置 Python ==========
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ========== 4. 安装 Python 依赖 ==========
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet flet-desktop cryptography requests

      # ========== 5. 用 flet build 打包 ==========
      # flet build 会自动下载 Flutter SDK（~500MB）
      # CI 无 TTY，分平台用不同方式自动确认安装

      - name: Build with flet (Windows)
        if: matrix.target == 'windows'
        shell: cmd
        run: |
          chcp 65001 >nul
          echo y | flet build windows --output dist

      - name: Build with flet (Linux/macOS)
        if: matrix.target != 'windows'
        run: yes | flet build ${{ matrix.build_cmd }} --output dist

      # ========== 6. 整理构建产物：打包成 zip ==========
      - name: Prepare artifact
        shell: bash
        run: |
          set -e
          # flet build 默认输出到 dist/<platform>/ 或 build/<platform>/
          if [ -d "dist/${{ matrix.target }}" ]; then
            PLATFORM_DIR="dist/${{ matrix.target }}"
          elif [ -d "build/${{ matrix.target }}" ]; then
            PLATFORM_DIR="build/${{ matrix.target }}"
          else
            echo "ERROR: flet build output directory not found!"
            echo "Checked: dist/${{ matrix.target }}/ and build/${{ matrix.target }}/"
            echo "Contents of dist/:"
            ls -la dist/ 2>/dev/null || true
            echo "Contents of build/:"
            ls -la build/ 2>/dev/null || true
            exit 1
          fi

          echo "Packaging directory: $PLATFORM_DIR"
          ls -la "$PLATFORM_DIR"

          # 用 Python 创建 zip（跨平台一致，避免 shell 路径问题）
          mkdir -p release
          python -c "import shutil; shutil.make_archive('release/verilog-quiz-${{ matrix.target }}', 'zip', '$PLATFORM_DIR')"
          echo "Created: release/verilog-quiz-${{ matrix.target }}.zip"
          ls -lh release/

      # ========== 7. 上传构建产物 ==========
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verilog-quiz-${{ matrix.target }}
          path: release/*.zip
          retention-days: 30

      # ========== 8. 创建 Release ==========
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ## Verilog Quiz System v1.0.${{ github.run_number }}

            自动构建版本（flet build，开箱即用）

            ### 构建信息
            - 提交: ${{ github.sha }}
            - 提交者: ${{ github.event.head_commit.author.name }}
            - 提交信息: ${{ github.event.head_commit.message }}
            - 构建时间: ${{ github.event.head_commit.timestamp }}

            ### 下载说明
            1. 下载对应平台的 **zip 文件**
            2. 解压到任意目录
            3. 运行解压后的程序：
               - **Windows**: 双击 `verilog_quiz.exe`
               - **Linux**: `./verilog_quiz`
               - **macOS**: 双击应用图标或 `./verilog_quiz`

            ### 下载文件
            | 文件 | 平台 | 说明 |
            |------|------|------|
            | `verilog-quiz-windows.zip` | Windows 10/11 | 解压后双击 exe 运行 |
            | `verilog-quiz-linux.zip` | Ubuntu 22.04+ | 解压后赋予执行权限并运行 |
            | `verilog-quiz-macos.zip` | macOS 15.0+ | 解压后运行 |

            ### 系统要求
            - **Windows**: Windows 10/11，需预装 iverilog 和 GTKWave
            - **Linux**: Ubuntu 22.04+，需预装 iverilog 和 GTKWave
            - **macOS**: macOS 15.0+，需预装 iverilog 和 GTKWave
          files: release/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
